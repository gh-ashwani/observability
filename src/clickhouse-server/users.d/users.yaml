profiles:
  default:
    max_memory_usage: 10000000000
    use_uncompressed_cache: 0
    load_balancing: in_order
    log_queries: 1

users:
  default:
    password: ""
    profile: default
    networks:
      ip:
        - "::/0"
    quota: default

  api:
    password: api
    profile: default
    networks:
      ip:
        - "::/0"
    quota: default

  worker:
    password: worker
    profile: default
    networks:
      ip:
        - "::/0"
    quota: default

quotas:
  default:
    interval:
      duration: 3600
      queries: 0
      errors: 0
      result_rows: 0
      read_rows: 0
      execution_time: 0