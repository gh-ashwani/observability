logger:
  level: debug
  console: true
  log:
    remove: remove
  errorlog:
    remove: remove

listen_host:
  - 0.0.0.0

http_port: 8123
tcp_port: 9000

interserver_http_host: ch-server
interserver_http_port: 9009

max_connections: 4096
keep_alive_timeout: 64
max_concurrent_queries: 100

uncompressed_cache_size: 8589934592
mark_cache_size: 5368709120

path: /var/lib/clickhouse/
tmp_path: /var/lib/clickhouse/tmp/
user_files_path: /var/lib/clickhouse/user_files/

user_directories:
  users_xml:
    path: users.xml

default_profile: default
default_database: default
timezone: UTC

mlock_executable: false

prometheus:
  endpoint: /metrics
  port: 9363
  metrics: true
  events: true
  asynchronous_metrics: true
  errors: true

query_log:
  database: system
  table: query_log
  flush_interval_milliseconds: 7500

metric_log:
  database: system
  table: metric_log
  flush_interval_milliseconds: 7500
  collect_interval_milliseconds: 1000

asynchronous_metric_log:
  database: system
  table: asynchronous_metric_log
  flush_interval_milliseconds: 7000

opentelemetry_span_log:
  engine: |
    engine MergeTree
    partition by toYYYYMM(finish_date)
    order by (finish_date, finish_time_us, trace_id)

  database: system
  table: opentelemetry_span_log
  flush_interval_milliseconds: 7500

crash_log:
  database: system
  table: crash_log
  partition_by: ""
  flush_interval_milliseconds: 1000

processors_profile_log:
  database: system
  table: processors_profile_log
  partition_by: toYYYYMM(event_date)
  flush_interval_milliseconds: 7500

part_log:
  database: system
  table: part_log
  partition_by: toYYYYMM(event_date)
  flush_interval_milliseconds: 7500

trace_log:
  database: system
  table: trace_log
  partition_by: toYYYYMM(event_date)
  flush_interval_milliseconds: 7500

query_thread_log:
  database: system
  table: query_thread_log
  partition_by: toYYYYMM(event_date)
  flush_interval_milliseconds: 7500

query_views_log:
  database: system
  table: query_views_log
  partition_by: toYYYYMM(event_date)
  flush_interval_milliseconds: 7500

remote_servers:
  hdx_cluster:
    shard:
      replica:
        host: ch-server
        port: 9000

distributed_ddl:
  path: /clickhouse/task_queue/ddl

format_schema_path: /var/lib/clickhouse/format_schemas/